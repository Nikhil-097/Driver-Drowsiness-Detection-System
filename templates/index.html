<!DOCTYPE html>
<html>
<head>
    <title>Drowsiness Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<section class="section">
    <div class="three-container"></div>
    <div class="content">
        <h1 class="animate">Drowsiness Detection System</h1>
        <p class="animate">AI Powered Real-Time Monitoring</p>
    </div>
</section>

<section class="section">
    <div class="three-container"></div>
    <div class="content">
        <h2 class="animate">Live Monitoring</h2>

        <div class="video-box animate">
            <img id="videoFeed" src="">
        </div>

        <div class="controls animate">
            <button onclick="startCamera()">Start</button>
            <button onclick="stopCamera()">Stop</button>
        </div>

        <div id="status" class="animate">Status: Idle</div>

        <!-- EAR GRAPH -->
        <canvas id="earChart" width="600" height="200"></canvas>
    </div>
</section>

<section class="section">
    <div class="three-container"></div>
    <div class="content">
        <h2 class="animate">System Performance</h2>
        <p class="animate">Real-time FPS monitoring enabled.</p>
    </div>
</section>

<section class="section">
    <div class="three-container"></div>
    <div class="content">
        <h2 class="animate">AI Engine</h2>
        <p class="animate">Dlib 68-point facial landmark detection.</p>
    </div>
</section>

<section class="section">
    <div class="three-container"></div>
    <div class="content">
        <h2 class="animate">Alert System</h2>
        <p class="animate">Audio alert triggered when drowsiness detected.</p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
